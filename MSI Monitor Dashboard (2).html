<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealNZ – MSI Monitor Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px}
.topbar{background:#1a1a1a;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:50px;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo{color:#fff;font-weight:700;font-size:17px;letter-spacing:-0.3px}
.top-div{width:1px;height:22px;background:#3a3a3a}
.topbar-title{color:#aaa;font-size:13px}
.topbar-right{background:#2a2a2a;border:1px solid #3a3a3a;border-radius:6px;padding:5px 13px;color:#aaa;font-size:12px}
.content{padding:28px 32px;max-width:1100px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:20px 24px}
.stat-label{font-size:11px;color:#999;letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px}
.stat-val{font-size:30px;font-weight:700}
.stat-val.green{color:#2d7a3a}
.stat-val.red{color:#c0392b}
.stat-val.dark{color:#1a1a1a}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#666}
.btn-outline{background:#fff;border:1px solid #ddd;border-radius:6px;padding:7px 15px;font-size:12px;cursor:pointer;color:#333;display:flex;align-items:center;gap:6px}
.btn-outline:hover{background:#f5f5f5}
.monitors{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px}
.mon-card{background:#fff;border:1.5px solid #e0e0e0;border-radius:10px;padding:18px}
.mon-card.out{border-color:#e8a020}
.mon-card.overdue{border-color:#c0392b}
.mon-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:3px}
.mon-rid{font-size:11px;color:#999;font-weight:500}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.badge-available{background:#e8f5eb;color:#2d7a3a}
.badge-out{background:#fff4e0;color:#b07700}
.badge-overdue{background:#fdecea;color:#c0392b}
.mon-model{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:16px}
.mon-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:16px}
.mfl{font-size:10px;color:#bbb;letter-spacing:.5px;text-transform:uppercase;margin-bottom:2px}
.mfv{font-size:13px;color:#1a1a1a;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mfv.muted{color:#ccc;font-weight:400}
.mfv.danger{color:#c0392b}
.mff{grid-column:1/-1}
.mon-actions{display:flex;gap:8px}
.btn-checkout{flex:1;background:#2d7a3a;color:#fff;border:none;border-radius:7px;padding:10px;font-size:13px;font-weight:600;cursor:pointer}
.btn-checkout:hover{background:#245f2e}
.btn-return{flex:1;background:#c0392b;color:#fff;border:none;border-radius:7px;padding:10px;font-size:13px;font-weight:600;cursor:pointer}
.btn-return:hover{background:#992d22}
.btn-qr{background:#fff;border:1px solid #ddd;border-radius:7px;padding:10px 15px;font-size:12px;font-weight:600;cursor:pointer;color:#444}
.btn-qr:hover{background:#f5f5f5}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.btn-clear{background:#fff;border:1px solid #ddd;border-radius:6px;padding:6px 13px;font-size:12px;cursor:pointer;color:#999}
.btn-clear:hover{background:#fdecea;color:#c0392b;border-color:#e0a0a0}
.history-wrap{background:#fff;border:1px solid #e5e5e5;border-radius:10px;overflow:hidden;margin-bottom:40px}
.history-table{width:100%;border-collapse:collapse}
.history-table th{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:#999;padding:11px 16px;text-align:left;background:#fafafa;border-bottom:1px solid #eee;font-weight:600}
.history-table td{padding:11px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;color:#333}
.history-table tbody tr:last-child td{border-bottom:none}
.empty-row td{color:#ccc;text-align:center;padding:32px;font-style:italic}
.pill{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
.p-out{background:#fff4e0;color:#b07700}
.p-returned{background:#e8f5eb;color:#2d7a3a}
.p-overdue{background:#fdecea;color:#c0392b}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.overlay.active{display:flex}
.modal{background:#fff;border-radius:14px;padding:28px;width:440px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.2)}
.modal h2{font-size:17px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:12px;color:#999;margin-bottom:20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;font-weight:600}
.fg input,.fg textarea{width:100%;padding:9px 12px;border:1px solid #e0e0e0;border-radius:7px;font-size:14px;color:#1a1a1a;background:#fafafa;outline:none;font-family:inherit}
.fg input:focus,.fg textarea:focus{border-color:#2d7a3a;background:#fff}
.fg textarea{height:72px;resize:vertical}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{background:#fff;border:1px solid #ddd;border-radius:7px;padding:9px 18px;font-size:13px;cursor:pointer;color:#666}
.btn-cancel:hover{background:#f5f5f5}
.btn-confirm{background:#2d7a3a;color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer}
.btn-confirm:hover{background:#245f2e}
.qr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:16px 0}
.qr-cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.qr-cell-label{font-size:11px;font-weight:700;color:#444}
.single-qr-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.qr-url-box{font-size:10px;color:#bbb;background:#f8f8f8;border-radius:6px;padding:7px 10px;word-break:break-all;text-align:center}
.refresh-bar{background:#eaf5ea;border:1px solid #b6ddb6;border-radius:8px;padding:10px 16px;margin-bottom:20px;font-size:13px;color:#2d7a3a;display:none;align-items:center;justify-content:space-between}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">RealNZ</span>
    <div class="top-div"></div>
    <span class="topbar-title">MSI Portable Monitor</span>
  </div>
  <div class="topbar-right">📋 IT Asset Tracker</div>
</div>

<div class="content">
  <div class="refresh-bar" id="refresh-bar">
    ✅ A monitor was just checked out via QR form.
    <button class="btn-outline" style="font-size:12px;padding:4px 12px" onclick="dismissRefresh()">Dismiss</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="section-header">
    <span class="section-label">Monitors</span>
    <button class="btn-outline" onclick="showAllQR()">📱 QR codes</button>
  </div>
  <div class="monitors" id="monitors"></div>

  <div class="history-header">
    <span class="section-label">Checkout History</span>
    <button class="btn-clear" onclick="clearHistory()">Clear history</button>
  </div>
  <div class="history-wrap">
    <table class="history-table">
      <thead><tr>
        <th>Monitor</th><th>Name</th><th>Email</th><th>Purpose</th><th>Date out</th><th>Return by</th><th>Status</th>
      </tr></thead>
      <tbody id="history-body"></tbody>
    </table>
  </div>
</div>

<div class="overlay" id="overlay" onclick="overlayBg(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
const UNITS = [
  {id:'RIT2284',model:'MSI Pro MP161 E2'},
  {id:'RIT2285',model:'MSI Pro MP161 E2'},
  {id:'RIT2286',model:'MSI Pro MP161 E2'},
  {id:'RIT2287',model:'MSI Pro MP161 E2'},
  {id:'RIT2288',model:'MSI Pro MP161 E2'},
  {id:'RIT2289',model:'MSI Pro MP161 E2'},
];

let checkouts = {};
let history   = [];

function saveData(){
  localStorage.setItem('realnz_checkouts', JSON.stringify(checkouts));
  localStorage.setItem('realnz_history',   JSON.stringify(history));
}
function loadData(){
  try {
    const c = localStorage.getItem('realnz_checkouts');
    const h = localStorage.getItem('realnz_history');
    if(c) checkouts = JSON.parse(c);
    if(h) history   = JSON.parse(h);
  } catch(e){}
}

function today(){ return new Date().toISOString().split('T')[0]; }
function fmt(d){
  if(!d) return '—';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}
function isOverdue(rid){
  const c = checkouts[rid];
  return c && c.returnDate && c.returnDate < today();
}

// Build form file URL from current dashboard URL
function getFormUrl(rid){
  const base = window.location.href
    .split('?')[0]
    .replace('MSI Monitor Dashboard.html','MSI Monitor Form.html');
  return base + '?monitor=' + encodeURIComponent(rid);
}

function render(){
  renderStats();
  renderMonitors();
  renderHistory();
}

function renderStats(){
  const out   = Object.values(checkouts).filter(c=>c&&c.name).length;
  const avail = 6 - out;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total monitors</div><div class="stat-val dark">6</div></div>
    <div class="stat-card"><div class="stat-label">Available</div><div class="stat-val green">${avail}</div></div>
    <div class="stat-card"><div class="stat-label">Checked out</div><div class="stat-val red">${out}</div></div>
  `;
}

function renderMonitors(){
  document.getElementById('monitors').innerHTML = UNITS.map(u => {
    const c     = checkouts[u.id];
    const isOut = c && c.name;
    const over  = isOverdue(u.id);
    const cls   = over ? 'overdue' : isOut ? 'out' : '';
    const badge = over
      ? `<span class="badge badge-overdue">⚠ Overdue</span>`
      : isOut
        ? `<span class="badge badge-out">● Out</span>`
        : `<span class="badge badge-available">✓ Available</span>`;
    return `
    <div class="mon-card ${cls}">
      <div class="mon-top"><span class="mon-rid">${u.id}</span>${badge}</div>
      <div class="mon-model">${u.model}</div>
      <div class="mon-fields">
        <div><div class="mfl">Name</div><div class="mfv ${!isOut?'muted':''}">${isOut?c.name:'—'}</div></div>
        <div><div class="mfl">Email</div><div class="mfv ${!isOut?'muted':''}" style="font-size:12px">${isOut?c.email:'—'}</div></div>
        <div><div class="mfl">Date out</div><div class="mfv ${!isOut?'muted':''}">${isOut?fmt(c.dateOut):'—'}</div></div>
        <div><div class="mfl">Return by</div><div class="mfv ${!isOut?'muted':''}${over?' danger':''}">${isOut?fmt(c.returnDate):'—'}</div></div>
        <div class="mff"><div class="mfl">Purpose</div><div class="mfv ${!isOut?'muted':''}">${isOut?(c.purpose||'—'):'—'}</div></div>
      </div>
      <div class="mon-actions">
        ${isOut
          ? `<button class="btn-return" onclick="returnUnit('${u.id}')">Return</button>`
          : `<button class="btn-checkout" onclick="openCheckout('${u.id}')">Check out</button>`
        }
        <button class="btn-qr" onclick="showQR('${u.id}')">QR</button>
      </div>
    </div>`;
  }).join('');
}

function renderHistory(){
  const tbody = document.getElementById('history-body');
  if(!history.length){
    tbody.innerHTML = `<tr class="empty-row"><td colspan="7">No checkout history yet</td></tr>`;
    return;
  }
  tbody.innerHTML = [...history].reverse().map(h => {
    const over = h.returnDate && h.returnDate < today() && h.status === 'out';
    const lbl  = over ? 'Overdue' : h.status === 'out' ? 'Out' : 'Returned';
    const cls  = over ? 'p-overdue' : h.status === 'out' ? 'p-out' : 'p-returned';
    return `<tr>
      <td><strong>${h.rid}</strong></td>
      <td>${h.name}</td>
      <td style="font-size:12px">${h.email}</td>
      <td style="font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.purpose||'—'}</td>
      <td>${fmt(h.dateOut)}</td>
      <td>${fmt(h.returnDate)}</td>
      <td><span class="pill ${cls}">${lbl}</span></td>
    </tr>`;
  }).join('');
}

function openCheckout(rid){
  const u = UNITS.find(x=>x.id===rid);
  showModal(`
    <h2>Check out ${rid}</h2>
    <div class="modal-sub">${u.model}</div>
    <div class="fg"><label>Name</label><input id="f-name" type="text" placeholder="Full name" autocomplete="name"></div>
    <div class="fg"><label>Email</label><input id="f-email" type="email" placeholder="email@realnz.com"></div>
    <div class="fg"><label>Return date</label><input id="f-return" type="date" value="${today()}"></div>
    <div class="fg"><label>Purpose</label><textarea id="f-purpose" placeholder="What will this be used for?"></textarea></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="submitCheckout('${rid}')">Confirm checkout</button>
    </div>
  `);
}

function submitCheckout(rid){
  const name       = document.getElementById('f-name').value.trim();
  const email      = document.getElementById('f-email').value.trim();
  const returnDate = document.getElementById('f-return').value;
  const purpose    = document.getElementById('f-purpose').value.trim();
  if(!name||!email||!returnDate){ alert('Please fill in name, email, and return date.'); return; }
  checkouts[rid] = {name, email, dateOut:today(), returnDate, purpose};
  history.push({rid, name, email, dateOut:today(), returnDate, purpose, status:'out'});
  saveData();
  closeModal();
  render();
}

function returnUnit(rid){
  if(!confirm(`Mark ${rid} as returned?`)) return;
  const entry = [...history].reverse().find(h=>h.rid===rid&&h.status==='out');
  if(entry) entry.status = 'returned';
  delete checkouts[rid];
  saveData();
  render();
}

function clearHistory(){
  if(!confirm('Clear all checkout history? This cannot be undone.')) return;
  history = [];
  saveData();
  render();
}

function showQR(rid){
  const url = getFormUrl(rid);
  const u   = UNITS.find(x=>x.id===rid);
  showModal(`
    <h2>QR code — ${rid}</h2>
    <div class="modal-sub">${u.model} · Users scan this to open the checkout form</div>
    <div class="single-qr-wrap">
      <div id="qr-single"></div>
      <div class="qr-url-box">${url}</div>
      <p style="font-size:12px;color:#999;text-align:center;max-width:300px;line-height:1.5">
        When scanned, users see a simple form — no dashboard. The dashboard updates automatically when they submit.
      </p>
    </div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Close</button></div>
  `, ()=>{
    new QRCode(document.getElementById('qr-single'),{
      text:url, width:200, height:200, colorDark:'#1a1a1a', colorLight:'#ffffff'
    });
  });
}

function showAllQR(){
  showModal(`
    <h2>All QR codes</h2>
    <div class="modal-sub">Print and attach to each monitor. Users scan to open the checkout form directly.</div>
    <div class="qr-grid" id="all-qr-grid"></div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Close</button></div>
  `, ()=>{
    const grid = document.getElementById('all-qr-grid');
    UNITS.forEach(u => {
      const url  = getFormUrl(u.id);
      const cell = document.createElement('div');
      cell.className = 'qr-cell';
      const lbl = document.createElement('div');
      lbl.className   = 'qr-cell-label';
      lbl.textContent = u.id;
      const qd = document.createElement('div');
      cell.appendChild(lbl);
      cell.appendChild(qd);
      grid.appendChild(cell);
      new QRCode(qd,{text:url, width:110, height:110, colorDark:'#1a1a1a', colorLight:'#ffffff'});
    });
  });
}

function dismissRefresh(){
  document.getElementById('refresh-bar').style.display = 'none';
}

// Poll localStorage every 5s to pick up form submissions
function pollForUpdates(){
  const prevOut = Object.keys(checkouts).length;
  loadData();
  const newOut  = Object.keys(checkouts).length;
  if(newOut !== prevOut){
    render();
    const bar = document.getElementById('refresh-bar');
    bar.style.display = 'flex';
    setTimeout(()=>{ bar.style.display='none'; }, 8000);
  }
}

function showModal(html, after){
  document.getElementById('modal').innerHTML = html;
  document.getElementById('overlay').classList.add('active');
  if(after) setTimeout(after, 60);
}
function closeModal(){ document.getElementById('overlay').classList.remove('active'); }
function overlayBg(e){ if(e.target===e.currentTarget) closeModal(); }

loadData();
render();
setInterval(pollForUpdates, 5000);
</script>
</body>
</html>
