<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealNZ – Monitor Checkout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f0;color:#1a1a1a;min-height:100vh}

.topbar{background:#1a1a1a;display:flex;align-items:center;gap:14px;padding:0 24px;height:50px}
.logo{color:#fff;font-weight:700;font-size:17px;letter-spacing:-0.3px}
.top-div{width:1px;height:22px;background:#3a3a3a}
.topbar-sub{color:#aaa;font-size:13px}

.page{display:flex;justify-content:center;padding:40px 20px 60px}
.card{background:#fff;border-radius:16px;border:1px solid #e5e5e5;padding:32px 28px;width:100%;max-width:460px;box-shadow:0 2px 20px rgba(0,0,0,.07)}

.monitor-tag{display:inline-flex;align-items:center;gap:8px;background:#e8f5eb;border:1px solid #b6ddb6;border-radius:8px;padding:8px 14px;margin-bottom:24px}
.monitor-tag-id{font-size:13px;font-weight:700;color:#2d7a3a}
.monitor-tag-model{font-size:12px;color:#5a9a65}

h1{font-size:22px;font-weight:700;margin-bottom:6px;color:#1a1a1a}
.subtitle{font-size:14px;color:#888;margin-bottom:28px;line-height:1.5}

.fg{margin-bottom:18px}
.fg label{display:block;font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-weight:600}
.fg input,.fg textarea{
  width:100%;padding:12px 14px;
  border:1.5px solid #e0e0e0;
  border-radius:9px;
  font-size:15px;color:#1a1a1a;
  background:#fafafa;
  outline:none;
  font-family:inherit;
  transition:border-color .15s;
}
.fg input:focus,.fg textarea:focus{border-color:#2d7a3a;background:#fff}
.fg textarea{height:80px;resize:vertical}

.submit-btn{
  width:100%;
  background:#2d7a3a;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:15px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
  letter-spacing:.2px;
  transition:background .15s;
}
.submit-btn:hover{background:#245f2e}
.submit-btn:active{background:#1e5429}

.err{color:#c0392b;font-size:13px;margin-top:6px;display:none}

.success{text-align:center;padding:16px 8px}
.success-icon{font-size:60px;margin-bottom:16px;display:block}
.success-title{font-size:22px;font-weight:700;margin-bottom:10px;color:#2d7a3a}
.success-msg{font-size:15px;color:#666;line-height:1.7}
.success-detail{background:#e8f5eb;border-radius:10px;padding:14px 18px;margin:20px 0;text-align:left}
.success-detail-row{font-size:13px;color:#444;margin-bottom:6px;display:flex;gap:8px}
.success-detail-row:last-child{margin-bottom:0}
.sdl{color:#999;min-width:80px}

.already-out{text-align:center;padding:16px 8px}
.already-icon{font-size:52px;margin-bottom:14px;display:block}
.already-title{font-size:20px;font-weight:700;margin-bottom:10px;color:#b07700}
.already-msg{font-size:14px;color:#666;line-height:1.7}

.unknown{text-align:center;padding:16px 8px}

/* Monitor selector (shown when no ?monitor= param) */
.select-wrap{margin-bottom:24px}
.select-wrap select{
  width:100%;padding:12px 14px;
  border:1.5px solid #e0e0e0;
  border-radius:9px;
  font-size:15px;color:#1a1a1a;
  background:#fafafa;
  outline:none;
  font-family:inherit;
  cursor:pointer;
}
.select-wrap select:focus{border-color:#2d7a3a;background:#fff}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">RealNZ</span>
  <div class="top-div"></div>
  <span class="topbar-sub">Monitor Checkout</span>
</div>

<div class="page">
  <div class="card" id="card"></div>
</div>

<script>
const UNITS = {
  'RIT2284': 'MSI Pro MP161 E2',
  'RIT2285': 'MSI Pro MP161 E2',
  'RIT2286': 'MSI Pro MP161 E2',
  'RIT2287': 'MSI Pro MP161 E2',
  'RIT2288': 'MSI Pro MP161 E2',
  'RIT2289': 'MSI Pro MP161 E2',
};

function today(){ return new Date().toISOString().split('T')[0]; }
function fmt(d){
  if(!d) return '—';
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}
function getCheckouts(){
  try{ const c=localStorage.getItem('realnz_checkouts'); return c?JSON.parse(c):{}; }catch(e){ return {}; }
}
function getHistory(){
  try{ const h=localStorage.getItem('realnz_history'); return h?JSON.parse(h):[]; }catch(e){ return []; }
}

const params = new URLSearchParams(window.location.search);
let rid      = params.get('monitor');
const card   = document.getElementById('card');

if(rid && UNITS[rid]){
  loadMonitor(rid);
} else {
  // No param — show a monitor picker so the form still works standalone
  showPicker();
}

function showPicker(){
  const opts = Object.keys(UNITS).map(id=>`<option value="${id}">${id} — ${UNITS[id]}</option>`).join('');
  card.innerHTML = `
    <h1 style="margin-bottom:8px">Check out a monitor</h1>
    <p class="subtitle">Select the monitor you are taking, then fill in your details.</p>
    <div class="select-wrap">
      <select id="mon-select">
        <option value="">— Select monitor —</option>
        ${opts}
      </select>
    </div>
    <button class="submit-btn" onclick="pickMonitor()">Continue</button>
  `;
}

function pickMonitor(){
  const sel = document.getElementById('mon-select').value;
  if(!sel){ alert('Please select a monitor.'); return; }
  rid = sel;
  loadMonitor(rid);
}

function loadMonitor(monId){
  const checkouts = getCheckouts();
  const existing  = checkouts[monId];
  if(existing && existing.name){
    card.innerHTML = `
      <div class="already-out">
        <span class="already-icon">⚠️</span>
        <div class="already-title">${monId} is already checked out</div>
        <div class="already-msg">
          Currently with <strong>${existing.name}</strong><br>
          Due back: <strong>${fmt(existing.returnDate)}</strong><br><br>
          Please speak to IT if you need assistance.
        </div>
      </div>`;
  } else {
    showForm(monId);
  }
}

function showForm(monId){
  const model = UNITS[monId];
  card.innerHTML = `
    <div class="monitor-tag">
      <span class="monitor-tag-id">📺 ${monId}</span>
      <span class="monitor-tag-model">${model}</span>
    </div>
    <h1>Check out monitor</h1>
    <p class="subtitle">Fill in your details below. The IT team will be notified automatically.</p>
    <div class="fg">
      <label>Your name</label>
      <input id="f-name" type="text" placeholder="Full name" autocomplete="name">
    </div>
    <div class="fg">
      <label>Your email</label>
      <input id="f-email" type="email" placeholder="name@realnz.com" autocomplete="email">
    </div>
    <div class="fg">
      <label>Return date</label>
      <input id="f-return" type="date" value="${today()}" min="${today()}">
    </div>
    <div class="fg">
      <label>Purpose</label>
      <textarea id="f-purpose" placeholder="What will you use this monitor for?"></textarea>
    </div>
    <div class="err" id="err">Please fill in your name, email, and return date.</div>
    <button class="submit-btn" onclick="submitForm('${monId}')">Submit checkout</button>
  `;
}

function submitForm(monId){
  const name       = document.getElementById('f-name').value.trim();
  const email      = document.getElementById('f-email').value.trim();
  const returnDate = document.getElementById('f-return').value;
  const purpose    = document.getElementById('f-purpose').value.trim();
  const err        = document.getElementById('err');
  if(!name||!email||!returnDate){ err.style.display='block'; return; }
  err.style.display='none';

  const dateOut   = today();
  const checkouts = getCheckouts();
  const history   = getHistory();
  checkouts[monId] = {name, email, dateOut, returnDate, purpose};
  history.push({rid:monId, name, email, dateOut, returnDate, purpose, status:'out'});
  localStorage.setItem('realnz_checkouts', JSON.stringify(checkouts));
  localStorage.setItem('realnz_history',   JSON.stringify(history));

  const model = UNITS[monId];
  card.innerHTML = `
    <div class="success">
      <span class="success-icon">✅</span>
      <div class="success-title">You're all set!</div>
      <div class="success-msg">Thanks, <strong>${name}</strong>. Your checkout has been recorded.</div>
      <div class="success-detail">
        <div class="success-detail-row"><span class="sdl">Monitor</span><strong>${monId}</strong></div>
        <div class="success-detail-row"><span class="sdl">Model</span>${model}</div>
        <div class="success-detail-row"><span class="sdl">Date out</span>${fmt(dateOut)}</div>
        <div class="success-detail-row"><span class="sdl">Return by</span><strong>${fmt(returnDate)}</strong></div>
        ${purpose?`<div class="success-detail-row"><span class="sdl">Purpose</span>${purpose}</div>`:''}
      </div>
      <div class="success-msg" style="font-size:13px;color:#aaa">Please return this monitor to the IT office by the date above.</div>
    </div>
  `;
}
</script>
</body>
</html>
